project:
  name: my-app
  package: com.newland.myapp
  server-port: 3000

stack:
  java: 17
  spring-boot: 3.3.13
  mybatis-plus: 3.5.6

database:
  enabled: true
  type: mysql
  name: my_app_db

tenant:
  enabled: true

i18n:
  enabled: false
  languages: [zh, en]

redis:
  enabled: true

spring-cloud:
  enabled: false
  discovery:
    component: nacos

auth:
  toms:
    enabled: true
    api-version: 3.4.00-JDK17-SNAPSHOT

maven:
  repositories:
    - id: aliyun-repos
      url: https://maven.aliyun.com/repository/public
      snapshots: false
